<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apfelstrudel - Live Coding with AI</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🥧 Apfelstrudel</h1>
      <div class="header-controls">
        <button id="btn-play" class="btn btn-play" title="Play (Ctrl+Enter)">▶ Play</button>
        <button id="btn-stop" class="btn btn-stop" title="Stop (Ctrl+.)">◼ Stop</button>
        <div class="tempo-control">
          <label for="tempo">BPM:</label>
          <input type="number" id="tempo" value="60" min="20" max="300" step="1">
        </div>
      </div>
    </header>

    <!-- Main content split pane -->
    <main class="main">
      <!-- Left: Strudel editor -->
      <section class="editor-pane">
        <div class="pane-header">
          <span>Pattern Editor</span>
          <span class="status" id="status-indicator">Ready</span>
        </div>
        <div id="strudel-container">
          <textarea id="code-editor" spellcheck="false">// Welcome to Apfelstrudel! 🥧
// Type a pattern and press Play, or ask the AI for help

s("bd sd").bank("RolandTR808")</textarea>
        </div>
        <div id="visualization"></div>
      </section>

      <!-- Resize handle -->
      <div class="resize-handle" id="resize-handle"></div>

      <!-- Right: Chat sidebar -->
      <aside class="chat-pane">
        <div class="pane-header">
          <span>AI Assistant</span>
        </div>
        <div id="chat-messages" class="chat-messages">
          <div class="message assistant">
            <div class="message-content">
              <p>Hi! I'm your Strudel assistant. I can help you:</p>
              <ul>
                <li>Write and modify music patterns</li>
                <li>Explain Strudel's mini-notation</li>
                <li>Control playback and tempo</li>
                <li>Explore sounds and samples</li>
              </ul>
              <p>Just type what you want to create!</p>
            </div>
          </div>
        </div>
        <form id="chat-form" class="chat-input">
          <textarea id="chat-input" placeholder="Ask about patterns, sounds, or say what music you want..." rows="2"></textarea>
          <button type="submit" class="btn btn-send" title="Send (Enter)">Send</button>
        </form>
      </aside>
    </main>
  </div>

  <!-- Import map for vendored dependencies -->
  <script type="importmap">
  {
    "imports": {
      "@strudel/web": "/vendor/strudel/web.mjs",
      "@strudel/mini": "/vendor/strudel/mini.mjs",
      "@strudel/webaudio": "/vendor/strudel/webaudio.mjs",
      "preact": "/vendor/preact/preact.mjs",
      "preact/hooks": "/vendor/preact/hooks.mjs",
      "htm": "/vendor/htm/htm.mjs"
    }
  }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
